<!DOCTYPE html>
<html>
<head>
    <title>🍉 Watermelon Chat Board</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Prism.js CSS for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />

    <style>
        body { font-family: Arial, sans-serif; margin: 10px; background: #f5f5f5; }
        #chat-box {
            border: 10px solid #006600;
            border-radius: 50%;
            background: radial-gradient(circle at center, #ff4d4d 70%, #33cc33 100%);
            width: 450px;
            height: 450px;
            margin: 40px auto;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        /* Decorative seeds */
        #chat-box::before {
            content: "● ● ● ● ●";
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            color: black;
            opacity: 0.4;
        }
        #chat-box::after {
            content: "● ● ● ● ●";
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            color: black;
            opacity: 0.4;
        }
        /* Stem */
        .stem {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 20px;
            background: #228B22;
            border-radius: 20px 20px 0 0;
        }

        #input-box { margin-top: 10px; display: flex; gap: 8px; max-width: 450px; margin: 10px auto; }
        #message { flex: 1; padding: 8px; font-size: 1em; border-radius: 20px; border: 1px solid #ccc; }
        button { padding: 8px 14px; font-size: 1em; background: #ff6f61; color: #fff; border: none; border-radius: 20px; cursor: pointer; }
        button:hover { background: #e85b50; }

        .user { background: #4a90e2; color: #fff; padding: 8px 12px; border-radius: 20px 20px 5px 20px; margin: 6px 0; display: inline-block; align-self: flex-end; }
        .ai { background: #e1e8ed; color: #333; padding: 8px 12px; border-radius: 20px 20px 20px 5px; margin: 6px 0; display: inline-block; align-self: flex-start; max-width: 100%; word-wrap: break-word; }
        .error { color: red; margin: 4px 0; }

        pre { background: #2d2d2d; color: #f8f8f2; padding: 8px; border-radius: 4px; overflow-x: auto; }
        code { font-family: Consolas, monospace; }

        /* Typing indicator styled as watermelon seeds */
        .typing {
            font-style: italic;
            color: #006600;
            margin: 12px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .typing span {
            display: inline-block;
            width: 10px;
            height: 14px;
            background: #2b1b0e;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <h1>🍉 Watermelon Chat Board</h1>
    <div id="chat-box">
        <div class="stem"></div>
    </div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const msgInput = document.getElementById("message");
            const msg = msgInput.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chat-box");

            const userBubble = document.createElement("div");
            userBubble.className = "user";
            userBubble.innerHTML = `<b>You:</b> ${msg}`;
            chatBox.appendChild(userBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            msgInput.value = "";

            // Typing indicator
            const typingIndicator = document.createElement("p");
            typingIndicator.className = "typing";
            typingIndicator.innerHTML = 'AI is typing <span></span><span></span><span></span>';
            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                chatBox.removeChild(typingIndicator);

                let reply = data.response || "";
                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";

                // Handle code blocks with Prism.js
                if (reply.includes("```")) {
                    const parts = reply.split("```");
                    let formatted = "<b>AI:</b> ";
                    for (let i = 0; i < parts.length; i++) {
                        if (i % 2 === 0) {
                            formatted += parts[i];
                        } else {
                            const langParts = parts[i].trim().split("\n");
                            let lang = "language-python";
                            if (langParts[0].match(/^[a-zA-Z]+$/)) {
                                lang = "language-" + langParts[0].toLowerCase();
                                langParts.shift();
                            }
                            const codeContent = langParts.join("\n");
                            formatted += `<pre><code class="${lang}">${codeContent.replace(/</g,"&lt;")}</code></pre>`;
                        }
                    }
                    aiBubble.innerHTML = formatted;
                    chatBox.appendChild(aiBubble);
                    Prism.highlightAllUnder(aiBubble);
                } else {
                    aiBubble.innerHTML = `<b>AI:</b> ${reply}`;
                    chatBox.appendChild(aiBubble);
                }

                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (err) {
                chatBox.removeChild(typingIndicator);
                chatBox.innerHTML += `<p class="error"><b>Error:</b> ${err.message}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById("message").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>

    <!-- Prism.js JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
</body>
</html>
