<!DOCTYPE html>
<html>
<head>
    <title>Chat API Interface</title>
    <!-- Prism.js CSS for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />

    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        #chat-box {
            border: 1px solid #ccc;
            padding: 10px;
            width: 500px;
            height: 350px;
            overflow-y: auto;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        #input-box { margin-top: 10px; }
        #message { width: 400px; padding: 8px; }
        button { padding: 8px 14px; }
        .user { color: #333; margin: 4px 0; }
        .ai { color: #0066cc; margin: 4px 0; }
        .typing { font-style: italic; color: gray; margin: 4px 0; }
        .error { color: red; margin: 4px 0; }
        pre {
            background: #f0f0f0;
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
        }
        code {
            font-family: Consolas, monospace;
        }
    </style>
</head>
<body>
    <h1>Chat API Interface</h1>
    <div id="chat-box"></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const msgInput = document.getElementById("message");
            const msg = msgInput.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<p class="user"><b>You:</b> ${msg}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            msgInput.value = "";

            // Show typing indicator
            const typingIndicator = document.createElement("p");
            typingIndicator.className = "typing";
            typingIndicator.innerText = "AI is typing...";
            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                if (chatBox.contains(typingIndicator)) {
                    chatBox.removeChild(typingIndicator);
                }

                let reply = data.reply;
                const aiLine = document.createElement("div");
                aiLine.className = "ai";

                if (reply.includes("```")) {
                    // Extract code block
                    const parts = reply.split("```");
                    let formatted = "<b>AI:</b> ";
                    for (let i = 0; i < parts.length; i++) {
                        if (i % 2 === 0) {
                            formatted += parts[i];
                        } else {
                            // Detect language (e.g., ```python)
                            const langParts = parts[i].trim().split("\n");
                            let lang = "language-python"; // default
                            if (langParts[0].match(/^[a-zA-Z]+$/)) {
                                lang = "language-" + langParts[0].toLowerCase();
                                langParts.shift();
                            }
                            const codeContent = langParts.join("\n");
                            formatted += `<pre><code class="${lang}">${codeContent.replace(/</g,"&lt;")}</code></pre>`;
                        }
                    }
                    aiLine.innerHTML = formatted;
                    chatBox.appendChild(aiLine);
                    Prism.highlightAllUnder(aiLine); // highlight code
                } else {
                    // Typewriter effect for normal text
                    aiLine.innerHTML = "<b>AI:</b> ";
                    chatBox.appendChild(aiLine);

                    let i = 0;
                    function typeWriter() {
                        if (i < reply.length) {
                            aiLine.innerHTML += reply.charAt(i);
                            i++;
                            setTimeout(typeWriter, 30);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                    typeWriter();
                }

            } catch (err) {
                if (chatBox.contains(typingIndicator)) {
                    chatBox.removeChild(typingIndicator);
                }
                chatBox.innerHTML += `<p class="error"><b>Error:</b> ${err.message}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Enter key shortcut
        document.getElementById("message").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>

    <!-- Prism.js JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
</body>
</html>
