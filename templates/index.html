<!DOCTYPE html>
<html>
<head>
    <title>Chat API UI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chat-box {
            border: 1px solid #ccc;
            padding: 10px;
            width: 400px;
            height: 300px;
            overflow-y: auto;
            background: #fafafa;
        }
        #input-box { margin-top: 10px; }
        #message { width: 300px; padding: 5px; }
        button { padding: 6px 12px; }
        .user { color: #333; }
        .bot { color: #0066cc; }
        .typing { font-style: italic; color: gray; }
    </style>
</head>
<body>
    <h1>Chat API Interface</h1>
    <div id="chat-box"></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const msgInput = document.getElementById("message");
            const msg = msgInput.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<p class="user"><b>You:</b> ${msg}</p>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            msgInput.value = "";

            // Show typing indicator
            const typingIndicator = document.createElement("p");
            typingIndicator.className = "typing";
            typingIndicator.innerText = "Bot is typing...";
            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                // Remove typing indicator
                chatBox.removeChild(typingIndicator);

                chatBox.innerHTML += `<p class="bot"><b>Bot:</b> ${data.reply}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.removeChild(typingIndicator);
                chatBox.innerHTML += `<p class="bot"><b>Error:</b> ${err}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Add Enter key shortcut
        document.getElementById("message").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // prevent form submission
                sendMessage();
            }
        });
    </script>
</body>
</html>
