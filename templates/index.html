<!DOCTYPE html>
<html>
<head>
  <title>🍉 Watermelon Demo</title>
  <style>
    body {
      background: #f5f7fa;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      color: #006600;
    }

    /* Watermelon slice */
    #chat-box {
      border: 10px solid #006600; /* rind */
      border-radius: 50%;         /* circular shape */
      background: radial-gradient(circle at center,
                  #ff4d4d 70%,    /* red flesh */
                  #33cc33 100%);  /* green edge */
      width: 400px;
      height: 400px;
      margin: 40px auto;
      padding: 20px;
      position: relative;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    /* Seeds */
    #chat-box::before {
      content: "● ● ● ● ●";
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: black;
      opacity: 0.5;
    }
    #chat-box::after {
      content: "● ● ● ● ●";
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      color: black;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <h1>🍉 Watermelon Chat Board Demo</h1>
  <div id="chat-box"></div>
</body>
</html>
