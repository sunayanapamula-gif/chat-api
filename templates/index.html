<!DOCTYPE html>
<html>
<head>
    <title>🍉 Watermelon Chat Board</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        #chat-box { border: 2px solid #006600; border-radius: 12px; background: #ffe6e6;
                    width: 400px; height: 400px; margin: auto; padding: 10px;
                    overflow-y: auto; }
        .user { background: #4a90e2; color: #fff; padding: 6px 10px; border-radius: 10px;
                margin: 6px 0; text-align: right; }
        .ai { background: #e1e8ed; color: #333; padding: 6px 10px; border-radius: 10px;
              margin: 6px 0; text-align: left; }
        .typing { font-style: italic; color: #555; margin: 6px 0; text-align: left; }
        #input-box { margin-top: 10px; display: flex; gap: 8px; max-width: 400px; margin: 10px auto; }
        #message { flex: 1; padding: 6px; border-radius: 8px; border: 1px solid #ccc; }
        button { padding: 6px 12px; background: #ff6f61; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #e85b50; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">🍉 Watermelon Chat Board</h1>
    <div id="chat-box"></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const msgInput = document.getElementById("message");

        // Allow Enter key to send message
        msgInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const msg = msgInput.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chat-box");

            // User bubble
            const userBubble = document.createElement("div");
            userBubble.className = "user";
            userBubble.innerHTML = msg;
            chatBox.appendChild(userBubble);

            msgInput.value = "";

            // Typing indicator
            const typingBubble = document.createElement("div");
            typingBubble.className = "typing";
            typingBubble.innerHTML = "AI is typing...";
            chatBox.appendChild(typingBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                // Remove typing indicator
                chatBox.removeChild(typingBubble);

                // AI bubble
                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";
                aiBubble.innerHTML = data.response || "Error: No reply";
                chatBox.appendChild(aiBubble);

                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.removeChild(typingBubble);
                const errorBubble = document.createElement("div");
                errorBubble.className = "ai";
                errorBubble.style.color = "red";
                errorBubble.innerHTML = "Error: " + err.message;
                chatBox.appendChild(errorBubble);
            }
        }
    </script>
</body>
</html>
