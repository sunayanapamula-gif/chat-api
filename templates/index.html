<!DOCTYPE html>
<html>
<head>
    <title>🍊 Orange Chat Board</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: #fff8f0; 
        }
        #chat-box { 
            border: 6px solid #ff8c00; 
            border-radius: 50%; /* perfect circle like an orange */
            background: radial-gradient(circle at center, #ffa500 60%, #ffcc80 100%);
            width: 420px; 
            height: 420px; 
            margin: auto; 
            padding: 20px; 
            overflow-y: auto; 
            color: #333;
            position: relative;
        }

        /* Orange seeds (small dots inside) */
        #chat-box::before {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 200px; height: 200px;
            background-image: radial-gradient(#fff 2px, transparent 3px);
            background-size: 40px 40px;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            pointer-events: none;
        }

        /* Orange segment lines */
        #chat-box::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background-image: repeating-conic-gradient(
                from 0deg,
                transparent 0deg 30deg,
                rgba(255,255,255,0.3) 30deg 32deg
            );
            transform: translate(-50%, -50%);
            border-radius: 50%;
            opacity: 0.4;
            pointer-events: none;
        }

        .user { 
            background: #ff7043; 
            color: #fff; 
            padding: 8px 12px; 
            border-radius: 12px; 
            margin: 6px 0; 
            text-align: right; 
            font-size: 14px;
        }
        .ai { 
            background: #fff3e0; 
            color: #222; 
            padding: 8px 12px; 
            border-radius: 12px; 
            margin: 6px 0; 
            text-align: left; 
            font-size: 14px;
            font-weight: 500;
        }
        .typing { 
            font-style: italic; 
            color: #ff8c00; 
            margin: 6px 0; 
            text-align: left; 
        }
        #input-box { 
            margin-top: 10px; 
            display: flex; 
            gap: 8px; 
            max-width: 420px; 
            margin: 10px auto; 
        }
        #message { 
            flex: 1; 
            padding: 8px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
            font-size: 14px;
        }
        button { 
            padding: 8px 14px; 
            background: #ff8c00; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover { 
            background: #e67e22; 
        }
    </style>
</head>
<body>
    <h1 style="text-align:center;">🍊 Orange Chat Board</h1>
    <div id="chat-box"></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const msgInput = document.getElementById("message");

        // Allow Enter key to send message
        msgInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const msg = msgInput.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chat-box");

            // User bubble with emoji
            const userBubble = document.createElement("div");
            userBubble.className = "user";
            userBubble.innerHTML = "🙂 " + msg;
            chatBox.appendChild(userBubble);

            msgInput.value = "";

            // Typing indicator with emoji
            const typingBubble = document.createElement("div");
            typingBubble.className = "typing";
            typingBubble.innerHTML = "🤖 AI is thinking...";
            chatBox.appendChild(typingBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                // Remove typing indicator
                chatBox.removeChild(typingBubble);

                // AI bubble with emoji
                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";
                aiBubble.innerHTML = "🍊 " + (data.response || "Error: No reply");
                chatBox.appendChild(aiBubble);

                // Auto-scroll
                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.removeChild(typingBubble);
                const errorBubble = document.createElement("div");
                errorBubble.className = "ai";
                errorBubble.style.color = "red";
                errorBubble.innerHTML = "⚠️ Error: " + err.message;
                chatBox.appendChild(errorBubble);
            }
        }
    </script>
</body>
</html>
