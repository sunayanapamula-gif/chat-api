<!DOCTYPE html>
<html>
<head>
    <title>🍊 Orange Chat Board + Betta Fish</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: linear-gradient(to bottom, #e0f7fa, #ffffff); 
            text-align: center;
            transition: background 0.5s ease;
        }
        h1 { margin-bottom: 15px; }

        #chat-box { 
            border: 8px solid #ff8c00; 
            border-radius: 50%; 
            background: radial-gradient(circle at center, #ffa500 55%, #ffcc80 100%);
            width: 420px; height: 420px; margin: auto; padding: 20px; 
            overflow-y: auto; color: #333; position: relative;
            box-shadow: 0 0 30px rgba(255,140,0,0.6), inset 0 0 20px rgba(255,255,255,0.4);
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        .glossy {
            position: absolute;
            top: 10%; left: 15%;
            width: 60%; height: 30%;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 70%);
            border-radius: 50%;
            opacity: 0.7;
            pointer-events: none;
        }

        #chat-box::before {
            content: "";
            position: absolute;
            top: -20px; left: -20px;
            width: 460px; height: 460px;
            border-radius: 50%;
            border: 4px solid rgba(0, 188, 212, 0.4);
            animation: ripple 4s infinite ease-in-out;
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        #chat-box::after {
            content: "";
            position: absolute;
            bottom: 10px; right: 20px;
            width: 12px; height: 12px;
            background: rgba(255,255,255,0.7);
            border-radius: 50%;
            box-shadow: 0 -30px 0 rgba(255,255,255,0.5),
                        -20px -60px 0 rgba(255,255,255,0.4),
                        25px -90px 0 rgba(255,255,255,0.3);
        }

        .user { background: #ff7043; color: #fff; padding: 8px 12px; border-radius: 16px; margin: 8px auto; text-align: right; font-size: 14px; display: block; max-width: 80%; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .ai { background: #fff3e0; color: #222; padding: 8px 12px; border-radius: 16px; margin: 8px auto; text-align: left; font-size: 14px; display: block; max-width: 80%; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .typing { font-style: italic; color: #ff8c00; margin: 6px auto; text-align: left; display: block; }

        #input-box { margin-top: 15px; display: flex; gap: 8px; max-width: 420px; margin-left: auto; margin-right: auto; }
        #message { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { padding: 8px 14px; background: #ff8c00; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e67e22; }

        #theme-btn { margin-top: 15px; background: #333; color: #fff; }

        #code-panel {
            position: fixed; top: 0; left: -500px; width: 400px; height: 100%;
            background: #2d2d2d; color: #f8f8f2; box-shadow: 4px 0 12px rgba(0,0,0,0.3);
            padding: 20px; overflow-y: auto; transition: all 0.6s ease; opacity: 0; z-index: 999;
        }
        #code-panel.show { left: 0; opacity: 1; }
        #close-btn, #normal-btn, #clear-btn {
            background: #ff8c00; color: #fff; border: none; padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px;
        }
        #close-btn:hover, #normal-btn:hover, #clear-btn:hover { background: #e67e22; }

        pre { background: #1e1e1e; padding: 12px; border-radius: 8px; font-size: 13px;
            font-family: Consolas, monospace; text-align: left; white-space: pre-wrap; word-wrap: break-word; line-height: 1.4; }

        /* Dark theme styles */
        body.dark { background: #121212; color: #eee; }
        body.dark #chat-box { background: radial-gradient(circle at center, #222 55%, #444 100%); box-shadow: 0 0 40px rgba(255,215,0,0.4), inset 0 0 20px rgba(255,215,0,0.2); }
        body.dark .ai { background: #333; color: #ffd700; }
        body.dark .user { background: #ff5722; }

        /* Golden star sparkles */
        .sparkle {
            position: absolute;
            width: 8px; height: 8px;
            background: radial-gradient(circle, #ffd700 40%, transparent 70%);
            border-radius: 50%;
            animation: sparkle 2s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes sparkle {
            0% { transform: scale(0.5); opacity: 0.6; }
            50% { transform: scale(1.4); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0.6; }
        }

        /* Betta fish image */
        #betta {
            position: absolute;
            width: 200px; 
            height: auto;
            top: 50px; 
            left: 50px;
            z-index: 30;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            transition: left 3s ease, top 3s ease;
            animation: bob 3s infinite ease-in-out;
        }
        @keyframes bob {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
    </style>
</head>
<body>
    <h1>🍊 Orange Chat Board</h1>
    <button id="theme-btn" onclick="toggleTheme()">Toggle Dark Theme</button>
    <div id="chat-box"><div class="glossy"></div></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <div id="code-panel">
        <button id="close-btn" onclick="closeCode()">Close ✖</button>
        <button id="clear-btn" onclick="clearAppear()">Clear Appear</button>
        <button id="normal-btn" onclick="backToNormal()">Back to Normal</button>
        <pre id="code-content"></pre>
    </div>

        <!-- Real Betta Fish Image -->
    <img id="betta" src="../images/betta.png" alt="Betta Fish">

    <script>
        const msgInput = document.getElementById("message");
        const chatBox = document.getElementById("chat-box");
        const betta = document.getElementById("betta");

        msgInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") { 
                event.preventDefault(); 
                sendMessage(); 
            }
        });

        function sendMessage() {
            const msg = msgInput.value.trim();
            if (!msg) return;

            const userBubble = document.createElement("div");
            userBubble.className = "user";
            userBubble.innerHTML = "😳 " + msg;
            chatBox.appendChild(userBubble);

            msgInput.value = "";

            const typingBubble = document.createElement("div");
            typingBubble.className = "typing";
            typingBubble.innerHTML = "🤖 AI is generating...";
            chatBox.appendChild(typingBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Call Ollama API via ngrok
            fetch("https://nonsuppressed-glottal-tonette.ngrok-free.dev/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama3.2",   // adjust to the exact model you run
                    prompt: msg
                })
            })
            .then(res => res.json())
            .then(data => {
                chatBox.removeChild(typingBubble);

                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";
                aiBubble.innerHTML = "🍊 " + (data.response || "No reply");
                chatBox.appendChild(aiBubble);
                chatBox.scrollTop = chatBox.scrollHeight;

                // If AI response contains code, show in code panel
                if (data.response && data.response.includes("```")) {
                    generateCode(data.response);
                }
            })
            .catch(err => {
                chatBox.removeChild(typingBubble);

                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";
                aiBubble.innerHTML = "⚠️ Error contacting Ollama: " + err.message;
                chatBox.appendChild(aiBubble);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // Code panel functions
        function generateCode(userRequest) {
            const codePanel = document.getElementById("code-panel");
            const codeContent = document.getElementById("code-content");
            codeContent.textContent = userRequest;
            codePanel.classList.add("show");
        }

        function closeCode() {
            document.getElementById("code-panel").classList.remove("show");
        }

        function clearAppear() {
            const codePanel = document.getElementById("code-panel");
            codePanel.style.opacity = "0";
            setTimeout(() => {
                codePanel.style.opacity = "1";
            }, 600);
        }

        function backToNormal() {
            const codePanel = document.getElementById("code-panel");
            const codeContent = document.getElementById("code-content");
            codeContent.textContent = ""; 
            codePanel.classList.remove("show"); 
            codePanel.style.opacity = "0"; 
        }

        // Sparkles always visible
        function addSparkles() {
            document.querySelectorAll(".sparkle").forEach(s => s.remove());
            for (let i = 0; i < 12; i++) {
                const sparkle = document.createElement("div");
                sparkle.className = "sparkle";
                sparkle.style.top = Math.random() * 380 + "px";
                sparkle.style.left = Math.random() * 380 + "px";
                sparkle.style.animationDelay = (Math.random() * 2) + "s";
                document.getElementById("chat-box").appendChild(sparkle);
            }
        }
        addSparkles();

        function toggleTheme() {
            document.body.classList.toggle("dark");
            addSparkles(); // refresh sparkles each time
        }

        // Random betta fish movement
        function moveBettaRandomly() {
            const screenWidth = window.innerWidth - 220;
            const screenHeight = window.innerHeight - 220;
            const newX = Math.random() * screenWidth;
            const newY = Math.random() * screenHeight;
            betta.style.transition = "left 3s ease, top 3s ease";
            betta.style.left = newX + "px";
            betta.style.top = newY + "px";
        }
        setInterval(moveBettaRandomly, 4000);

        // Escape mechanic for betta when arrow keys are pressed
        document.addEventListener("keydown", function(event) {
            const currentX = betta.offsetLeft;
            const currentY = betta.offsetTop;
            let escapeX = currentX;
            let escapeY = currentY;

            if (event.key === "ArrowUp") escapeY += 80;
            if (event.key === "ArrowDown") escapeY -= 80;
            if (event.key === "ArrowLeft") escapeX += 80;
            if (event.key === "ArrowRight") escapeX -= 80;

            escapeX = Math.max(0, Math.min(window.innerWidth - 220, escapeX));
            escapeY = Math.max(0, Math.min(window.innerHeight - 220, escapeY));

            betta.style.left = escapeX + "px";
            betta.style.top = escapeY + "px";
        });
    </script>
</body>
</html>
