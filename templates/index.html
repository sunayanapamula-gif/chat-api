<!DOCTYPE html>
<html>
<head>
    <title>Chat API Interface</title>
    <!-- Prism.js CSS for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            background: #f5f5f5;
        }

        #chat-box {
            border: 1px solid #ccc;
            padding: 10px;
            width: 100%;
            max-width: 600px;
            height: 60vh;
            overflow-y: auto;
            background: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin: 0 auto;
        }

        #input-box {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            max-width: 600px;
            margin: 10px auto;
        }

        #message {
            flex: 1;
            padding: 8px;
            font-size: 1em;
        }

        button {
            padding: 8px 14px;
            font-size: 1em;
        }

        .user {
            display: inline-block;
            background: #ff4d4d;
            color: #fff;
            padding: 8px 12px;
            border-radius: 20px 20px 5px 20px;
            margin: 6px 0;
            animation: fadeUp 0.6s ease;
            word-wrap: break-word;
        }

        .ai {
            display: inline-block;
            background: #0066cc;
            color: #fff;
            padding: 8px 12px;
            border-radius: 20px 20px 20px 5px;
            margin: 6px 0;
            animation: fadeUp 0.6s ease;
            word-wrap: break-word;
        }

        .typing {
            font-style: italic;
            color: gray;
            margin: 4px 0;
            display: flex;
            align-items: center;
        }

        .typing span {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin-left: 4px;
            background: gray;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); }
            40% { transform: scale(1); }
        }

        .error { color: red; margin: 4px 0; }

        pre {
            background: #f0f0f0;
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
        }
        code {
            font-family: Consolas, monospace;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            #chat-box {
                height: 70vh;
            }
            h1 {
                font-size: 1.4em;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <h1>Chat API Interface</h1>
    <div id="chat-box"></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const msgInput = document.getElementById("message");
            const msg = msgInput.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chat-box");

            const userBubble = document.createElement("div");
            userBubble.className = "user";
            userBubble.innerHTML = `<b>You:</b> ${msg}`;
            chatBox.appendChild(userBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            msgInput.value = "";

            const typingIndicator = document.createElement("p");
            typingIndicator.className = "typing";
            typingIndicator.innerHTML = "Please wait — generating reply <span></span><span></span><span></span>";
            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Use relative URL if served by Flask, otherwise fallback to full origin
                const res = await fetch(window.location.origin + "/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                if (chatBox.contains(typingIndicator)) {
                    chatBox.removeChild(typingIndicator);
                }

                let reply = data.reply;
                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";

                if (reply.includes("```")) {
                    const parts = reply.split("```");
                    let formatted = "<b>AI:</b> ";
                    for (let i = 0; i < parts.length; i++) {
                        if (i % 2 === 0) {
                            formatted += parts[i];
                        } else {
                            const langParts = parts[i].trim().split("\n");
                            let lang = "language-python";
                            if (langParts[0].match(/^[a-zA-Z]+$/)) {
                                lang = "language-" + langParts[0].toLowerCase();
                                langParts.shift();
                            }
                            const codeContent = langParts.join("\n");
                            formatted += `<pre><code class="${lang}">${codeContent.replace(/</g,"&lt;")}</code></pre>`;
                        }
                    }
                    aiBubble.innerHTML = formatted;
                    chatBox.appendChild(aiBubble);
                    Prism.highlightAllUnder(aiBubble);
                } else {
                    aiBubble.innerHTML = "<b>AI:</b> ";
                    chatBox.appendChild(aiBubble);

                    let i = 0;
                    function typeWriter() {
                        if (i < reply.length) {
                            aiBubble.innerHTML += reply.charAt(i);
                            i++;
                            setTimeout(typeWriter, 30);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                    typeWriter();
                }

                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (err) {
                if (chatBox.contains(typingIndicator)) {
                    chatBox.removeChild(typingIndicator);
                }
                chatBox.innerHTML += `<p class="error"><b>Error:</b> ${err.message}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById("message").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage(;
            }
        });
    </script>

    <!-- Prism.js JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
</body>
</html>
