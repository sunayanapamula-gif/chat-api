<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat Board</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #chatBox { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; }
    .user { color: blue; margin: 5px 0; }
    .bot { color: green; margin: 5px 0; }
    #inputBox { width: 80%; padding: 8px; }
    #sendBtn { padding: 8px; }
  </style>
</head>
<body>
  <h2>Chat Board</h2>
  <div id="chatBox"></div>
  <input id="inputBox" type="text" placeholder="Type your message...">
  <button id="sendBtn">Send</button>

  <script>
    const chatBox = document.getElementById("chatBox");
    const inputBox = document.getElementById("inputBox");
    const sendBtn = document.getElementById("sendBtn");

    async function sendMessage() {
      const msg = inputBox.value.trim();
      if (!msg) return;
      chatBox.innerHTML += `<p class="user"><b>You:</b> ${msg}</p>`;
      inputBox.value = "";

      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let botReply = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        botReply += decoder.decode(value, { stream: true });
        // Update live as tokens arrive
        const existingBot = document.querySelector("#chatBox .bot:last-child");
        if (existingBot) {
          existingBot.innerHTML = `<b>Bot:</b> ${botReply}`;
        } else {
          chatBox.innerHTML += `<p class="bot"><b>Bot:</b> ${botReply}</p>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputBox.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
