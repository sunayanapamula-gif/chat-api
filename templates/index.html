<!DOCTYPE html>
<html>
<head>
    <title>Chat API UI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chat-box { border: 1px solid #ccc; padding: 10px; width: 400px; height: 300px; overflow-y: auto; }
        #input-box { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Chat API Interface</h1>
    <div id="chat-box"></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const msg = document.getElementById("message").value;
            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            document.getElementById("chat-box").innerHTML += "<p><b>You:</b> " + msg + "</p>";
            document.getElementById("chat-box").innerHTML += "<p><b>Bot:</b> " + data.reply + "</p>";
            document.getElementById("message").value = "";
        }
    </script>
</body>
</html>
