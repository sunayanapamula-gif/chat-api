<!DOCTYPE html>
<html>
<head>
    <title>🍉 Watermelon Chat Board</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: #f5f5f5; 
        }
        #chat-box { 
            border: 4px solid #006600; 
            border-radius: 50% / 25%; /* gives a cut watermelon oval look */
            background: linear-gradient(to bottom, #ff4d4d 70%, #006600 30%); 
            width: 420px; 
            height: 420px; 
            margin: auto; 
            padding: 20px; 
            overflow-y: auto; 
            color: #fff;
        }
        .user { 
            background: #4a90e2; 
            color: #fff; 
            padding: 6px 10px; 
            border-radius: 10px; 
            margin: 6px 0; 
            text-align: right; 
        }
        .ai { 
            background: #fff; 
            color: #333; 
            padding: 6px 10px; 
            border-radius: 10px; 
            margin: 6px 0; 
            text-align: left; 
        }
        .typing { 
            font-style: italic; 
            color: #eee; 
            margin: 6px 0; 
            text-align: left; 
        }
        #input-box { 
            margin-top: 10px; 
            display: flex; 
            gap: 8px; 
            max-width: 420px; 
            margin: 10px auto; 
        }
        #message { 
            flex: 1; 
            padding: 6px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
        }
        button { 
            padding: 6px 12px; 
            background: #ff6f61; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
        }
        button:hover { 
            background: #e85b50; 
        }
    </style>
</head>
<body>
    <h1 style="text-align:center;">🍉 Watermelon Chat Board</h1>
    <div id="chat-box"></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const msgInput = document.getElementById("message");

        // Allow Enter key to send message
        msgInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const msg = msgInput.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chat-box");

            // User bubble
            const userBubble = document.createElement("div");
            userBubble.className = "user";
            userBubble.innerHTML = msg;
            chatBox.appendChild(userBubble);

            msgInput.value = "";

            // Typing indicator
            const typingBubble = document.createElement("div");
            typingBubble.className = "typing";
            typingBubble.innerHTML = "AI is typing...";
            chatBox.appendChild(typingBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                // Remove typing indicator
                chatBox.removeChild(typingBubble);

                // AI bubble
                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";
                aiBubble.innerHTML = data.response || "Error: No reply";
                chatBox.appendChild(aiBubble);

                chatBox.scrollTop = chatBox.scrollHeight;
            } catch (err) {
                chatBox.removeChild(typingBubble);
                const errorBubble = document.createElement("div");
                errorBubble.className = "ai";
                errorBubble.style.color = "red";
                errorBubble.innerHTML = "Error: " + err.message;
                chatBox.appendChild(errorBubble);
            }
        }
    </script>
</body>
</html>
