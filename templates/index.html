<!DOCTYPE html>
<html>
<head>
    <title>🍊 Orange Chat Board + Betta Fish</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: linear-gradient(to bottom, #e0f7fa, #ffffff); text-align: center; transition: background 0.5s ease; }
        h1 { margin-bottom: 15px; }

        #chat-box { border: 8px solid #ff8c00; border-radius: 50%; background: radial-gradient(circle at center, #ffa500 55%, #ffcc80 100%); width: 420px; height: 420px; margin: auto; padding: 20px; overflow-y: auto; color: #333; position: relative; box-shadow: 0 0 30px rgba(255,140,0,0.6), inset 0 0 20px rgba(255,255,255,0.4); transition: background 0.5s ease, box-shadow 0.5s ease; }
        .glossy { position: absolute; top: 10%; left: 15%; width: 60%; height: 30%; background: radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 70%); border-radius: 50%; opacity: 0.7; pointer-events: none; }

        .user { background: #ff7043; color: #fff; padding: 8px 12px; border-radius: 16px; margin: 8px auto; text-align: right; font-size: 14px; display: block; max-width: 80%; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .ai { background: #fff3e0; color: #222; padding: 8px 12px; border-radius: 16px; margin: 8px auto; text-align: left; font-size: 14px; display: block; max-width: 80%; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .typing { font-style: italic; color: #ff8c00; margin: 6px auto; text-align: left; display: block; }

        #input-box { margin-top: 15px; display: flex; gap: 8px; max-width: 420px; margin-left: auto; margin-right: auto; }
        #message { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
        button { padding: 8px 14px; background: #ff8c00; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e67e22; }

        #theme-btn { margin-top: 15px; background: #333; color: #fff; }

        /* Dark theme styles */
        body.dark { background: #121212; color: #eee; }
        body.dark #chat-box { background: radial-gradient(circle at center, #222 55%, #444 100%); box-shadow: 0 0 40px rgba(255,255,255,0.3), inset 0 0 20px rgba(255,255,255,0.2); }
        body.dark .ai { background: #333; color: #fff; }
        body.dark .user { background: #ff5722; }

        /* Stars shimmer with rainbow glow and drift */
        .star { position: absolute; border-radius: 50%; animation: twinkle 3s infinite ease-in-out, rainbowGlow 6s infinite linear, drift 10s infinite alternate ease-in-out; pointer-events: none; }
        @keyframes twinkle { 0% { transform: scale(0.5); opacity: 0.3; } 50% { transform: scale(1.4); opacity: 1; } 100% { transform: scale(0.5); opacity: 0.3; } }
        @keyframes rainbowGlow {
            0%   { background: radial-gradient(circle, red 60%, transparent 100%); box-shadow: 0 0 6px red, 0 0 12px red; }
            20%  { background: radial-gradient(circle, orange 60%, transparent 100%); box-shadow: 0 0 6px orange, 0 0 12px orange; }
            40%  { background: radial-gradient(circle, yellow 60%, transparent 100%); box-shadow: 0 0 6px yellow, 0 0 12px yellow; }
            60%  { background: radial-gradient(circle, green 60%, transparent 100%); box-shadow: 0 0 6px green, 0 0 12px green; }
            80%  { background: radial-gradient(circle, blue 60%, transparent 100%); box-shadow: 0 0 6px blue, 0 0 12px blue; }
            100% { background: radial-gradient(circle, violet 60%, transparent 100%); box-shadow: 0 0 6px violet, 0 0 12px violet; }
        }
        @keyframes drift { from { transform: translate(0, 0); } to { transform: translate(20px, -20px); } }

        /* Betta fish image */
        #betta {
            position: absolute;
            width: 150px; 
            height: auto;
            top: 50%; 
            left: calc(50% + 260px);
            z-index: 30;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
            transition: left 2s ease, top 2s ease;
            animation: swimTail 1s infinite ease-in-out;
        }
        @keyframes swimTail {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
            100% { transform: rotate(0deg); }
        }
    </style>
</head>
<body>
    <h1>🍊 Orange Chat Board</h1>
    <button id="theme-btn" onclick="toggleTheme()">Toggle Dark Theme</button>
    <div id="chat-box"><div class="glossy"></div></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <!-- Real Betta Fish Image -->
    <img id="betta" src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Betta_fish.jpg" alt="Betta Fish">

    <script>
        const msgInput = document.getElementById("message");
        const chatBox = document.getElementById("chat-box");
        const betta = document.getElementById("betta");

        msgInput.addEventListener("keydown", function(event) {
            if (event.key === "Enter") { event.preventDefault(); sendMessage(); }
        });

        function sendMessage() {
            const msg = msgInput.value.trim();
            if (!msg) return;

            const userBubble = document.createElement("div");
            userBubble.className = "user";
            userBubble.innerHTML = "😳 " + msg;
            chatBox.appendChild(userBubble);

            msgInput.value = "";

            const typingBubble = document.createElement("div");
            typingBubble.className = "typing";
            typingBubble.innerHTML = "🤖 AI is thinking...";
            chatBox.appendChild(typingBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(() => {
                chatBox.removeChild(typingBubble);

                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";
                aiBubble.innerHTML = msg.toLowerCase().includes("code") 
                    ? "🍊 Generating your code..." 
                    : "🍊 Got your message!";
                chatBox.appendChild(aiBubble);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        }

        // Random betta fish movement
        function moveBettaRandomly() {
            const screenWidth = window.innerWidth - 150;
            const screenHeight = window.innerHeight - 150;
            const newX = Math.random() * screenWidth;
            const newY = Math.random() * screenHeight;
            betta.style.left = newX + "px";
            betta.style.top = newY + "px";
        }
        setInterval(moveBettaRandomly, 4000);

                // Escape mechanic for betta when arrow keys are pressed
        document.addEventListener("keydown", function(event) {
            const currentX = betta.offsetLeft;
            const currentY = betta.offsetTop;
            let escapeX = currentX;
            let escapeY = currentY;

            if (event.key === "ArrowUp") escapeY += 80;   // fish swims down
            if (event.key === "ArrowDown") escapeY -= 80; // fish swims up
            if (event.key === "ArrowLeft") escapeX += 80; // fish swims right
            if (event.key === "ArrowRight") escapeX -= 80; // fish swims left

            // Keep fish inside screen bounds
            escapeX = Math.max(0, Math.min(window.innerWidth - 150, escapeX));
            escapeY = Math.max(0, Math.min(window.innerHeight - 150, escapeY));

            betta.style.left = escapeX + "px";
            betta.style.top = escapeY + "px";
        });

        // Dark theme toggle with rainbow glowing drifting stars
        function toggleTheme() {
            document.body.classList.toggle("dark");
            document.querySelectorAll(".star").forEach(s => s.remove());

            if (document.body.classList.contains("dark")) {
                for (let i = 0; i < 25; i++) {
                    const star = document.createElement("div");
                    star.className = "star";
                    star.style.top = Math.random() * 380 + "px";
                    star.style.left = Math.random() * 380 + "px";

                    // Random size
                    const size = (Math.random() * 3 + 2);
                    star.style.width = size + "px";
                    star.style.height = size + "px";

                    // Random animation delay
                    star.style.animationDelay = (Math.random() * 3) + "s";

                    document.getElementById("chat-box").appendChild(star);
                }
            }
        }
    </script>
</body>
</html>
