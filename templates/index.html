<!DOCTYPE html>
<html>
<head>
  <title>Chat Board</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; }
    #chatBox { width: 600px; margin: 20px auto; padding: 10px; background: white; border: 1px solid #ccc; }
    .user { color: blue; }
    .ai { color: green; }
  </style>
</head>
<body>
  <div id="chatBox"></div>
  <input id="userInput" type="text" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput").value;
      const chatBox = document.getElementById("chatBox");

      chatBox.innerHTML += `<div class="user">You: ${input}</div>`;

      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: input })
      });

      const data = await response.json();

      // ✅ Show AI reply or error
      if (data.reply) {
        chatBox.innerHTML += `<div class="ai">AI: ${data.reply}</div>`;
      } else if (data.error) {
        chatBox.innerHTML += `<div class="ai">Error: ${data.error}</div>`;
      } else {
        chatBox.innerHTML += `<div class="ai">AI: (no reply)</div>`;
      }
    }
  </script>
</body>
</html>
