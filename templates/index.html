<!DOCTYPE html>
<html>
<head>
    <title>Chat API Interface</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* (your CSS unchanged) */
    </style>
</head>
<body>
    <h1>Chat API Interface</h1>
    <div id="chat-box"></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const msgInput = document.getElementById("message");
            const msg = msgInput.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chat-box");

            const userBubble = document.createElement("div");
            userBubble.className = "user";
            userBubble.innerHTML = `<b>You:</b> ${msg}`;
            chatBox.appendChild(userBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            msgInput.value = "";

            const typingIndicator = document.createElement("p");
            typingIndicator.className = "typing";
            typingIndicator.innerHTML = "Please wait — generating reply <span></span><span></span><span></span>";
            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch(window.location.origin + "/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                if (chatBox.contains(typingIndicator)) {
                    chatBox.removeChild(typingIndicator);
                }

                let reply = data.reply || "(No reply received)";
                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";

                if (reply.includes("```")) {
                    const parts = reply.split("```");
                    let formatted = "<b>AI:</b> ";
                    for (let i = 0; i < parts.length; i++) {
                        if (i % 2 === 0) {
                            formatted += parts[i];
                        } else {
                            const langParts = parts[i].trim().split("\n");
                            let lang = "language-python";
                            if (langParts[0].match(/^[a-zA-Z]+$/)) {
                                lang = "language-" + langParts[0].toLowerCase();
                                langParts.shift();
                            }
                            const codeContent = langParts.join("\n");
                            formatted += `<pre><code class="${lang}">${codeContent.replace(/</g,"&lt;")}</code></pre>`;
                        }
                    }
                    aiBubble.innerHTML = formatted;
                    chatBox.appendChild(aiBubble);
                    Prism.highlightAllUnder(aiBubble);
                } else {
                    aiBubble.innerHTML = "<b>AI:</b> ";
                    chatBox.appendChild(aiBubble);

                    let i = 0;
                    function typeWriter() {
                        if (i < reply.length) {
                            aiBubble.innerHTML += reply.charAt(i);
                            i++;
                            setTimeout(typeWriter, 30);
                            chatBox.scrollTop = chatBox.scrollHeight;
                        }
                    }
                    typeWriter();
                }

                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (err) {
                if (chatBox.contains(typingIndicator)) {
                    chatBox.removeChild(typingIndicator);
                }
                chatBox.innerHTML += `<p class="error"><b>Error:</b> ${err.message}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Fix: correct Enter key handler
        document.getElementById("message").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();  // corrected
            }
        });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
</body>
</html>
