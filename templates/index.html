<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat Board</title>
  <!-- Prism.js CSS for syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #chatBox { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; }
    .user { color: blue; margin: 5px 0; }
    .bot { color: green; margin: 5px 0; }
    pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; }
    code { font-family: monospace; }
    #inputBox { width: 80%; padding: 8px; }
    #sendBtn { padding: 8px; }
  </style>
</head>
<body>
  <h2>Chat Board</h2>
  <div id="chatBox"></div>
  <input id="inputBox" type="text" placeholder="Type your message...">
  <button id="sendBtn">Send</button>

  <!-- Prism.js JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>

  <script>
    const chatBox = document.getElementById("chatBox");
    const inputBox = document.getElementById("inputBox");
    const sendBtn = document.getElementById("sendBtn");

    async function sendMessage() {
      const msg = inputBox.value.trim();
      if (!msg) return;
      chatBox.innerHTML += `<p class="user"><b>You:</b> ${msg}</p>`;
      inputBox.value = "";

      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let botReply = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        botReply += decoder.decode(value, { stream: true });

        // Split by code fences
        const parts = botReply.split("```");
        chatBox.innerHTML = ""; // reset and rebuild

        for (let i = 0; i < parts.length; i++) {
          if (i % 2 === 0) {
            // Normal text
            if (parts[i].trim()) {
              chatBox.innerHTML += `<p class="bot"><b>Bot:</b> ${parts[i]}</p>`;
            }
          } else {
            // Code block with optional language tag
            const firstLineBreak = parts[i].indexOf("\n");
            let lang = "language-python"; // default
            let codeContent = parts[i];

            if (firstLineBreak !== -1) {
              const maybeLang = parts[i].substring(0, firstLineBreak).trim();
              if (maybeLang) {
                lang = "language-" + maybeLang.toLowerCase();
                codeContent = parts[i].substring(firstLineBreak + 1);
              }
            }

            chatBox.innerHTML += `<pre><code class="${lang}">${codeContent}</code></pre>`;
          }
        }
        chatBox.scrollTop = chatBox.scrollHeight;
        Prism.highlightAll(); // re-run highlighting after update
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputBox.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
