<!DOCTYPE html>
<html>
<head>
    <title>🍉 Watermelon Chat Board</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Prism.js CSS for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa, #e6ebf0);
            color: #333;
        }

        h1 {
            text-align: center;
            padding: 20px;
            margin: 0;
            background: #33cc33; /* watermelon rind green */
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
        }

        #chat-box {
            border: 8px solid #006600; /* rind border */
            border-radius: 50%;        /* circular fruit shape */
            background: radial-gradient(circle at center,
                        #ff4d4d 70%,   /* red flesh */
                        #33cc33 100%); /* green rind edge */
            width: 400px;
            height: 400px;
            margin: 20px auto;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Decorative seeds */
        #chat-box::before {
            content: "● ● ● ● ●";
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: black;
            opacity: 0.4;
        }
        #chat-box::after {
            content: "● ● ● ● ●";
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: black;
            opacity: 0.4;
        }

        #input-box {
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto 20px auto;
            padding: 10px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        #message {
            flex: 1;
            padding: 12px;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            transition: border 0.3s;
        }

        #message:focus {
            border-color: #33cc33;
        }

        button {
            padding: 12px 20px;
            font-size: 1em;
            background: #ff6f61;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #e85b50;
        }

        /* Fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user, .ai {
            padding: 10px 14px;
            margin: 8px 0;
            display: inline-block;
            max-width: 70%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            animation: fadeIn 0.4s ease forwards;
        }

        .user {
            background: #4a90e2;
            color: #fff;
            border-radius: 20px 20px 5px 20px;
            align-self: flex-end;
        }

        .ai {
            background: #e1e8ed;
            color: #333;
            border-radius: 20px 20px 20px 5px;
            align-self: flex-start;
            word-wrap: break-word;
        }

        .error {
            color: red;
            margin: 4px 0;
        }

        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.9em;
        }

        code {
            font-family: Consolas, monospace;
        }

        /* Typing animation */
        .typing {
            font-style: italic;
            color: gray;
            margin: 6px 0;
            display: flex;
            align-items: center;
        }
        .typing span {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin-left: 4px;
            background: gray;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>🍉 Watermelon Chat Board</h1>
    <div id="chat-box"></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const msgInput = document.getElementById("message");
            const msg = msgInput.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chat-box");

            const userBubble = document.createElement("div");
            userBubble.className = "user";
            userBubble.innerHTML = `<b>You:</b> ${msg}`;
            chatBox.appendChild(userBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            msgInput.value = "";

            // Typing indicator
            const typingIndicator = document.createElement("p");
            typingIndicator.className = "typing";
            typingIndicator.innerHTML = "AI is typing <span></span><span></span><span></span>";
            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                chatBox.removeChild(typingIndicator);

                let reply = data.reply || data.response || "";
                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";

                // Handle code blocks with Prism.js
                if (reply.includes("```")) {
                    const parts = reply.split("```");
                    let formatted = "<b>AI:</b> ";
                    for (let i = 0; i < parts.length; i++) {
                        if (i % 2 === 0) {
                            formatted += parts[i];
                        } else {
                            const langParts = parts[i].trim().split("\n");
                            let lang = "language-python";
                            if (langParts[0].match(/^[a-zA-Z]+$/)) {
                                lang = "language-" + langParts[0].toLowerCase();
                                langParts.shift();
                            }
                            const codeContent = langParts.join("\n");
                            formatted += `<pre><code class="${lang}">${codeContent.replace(/</g,"&lt;")}</code></pre>`;
                        }
                    }
                    aiBubble.innerHTML = formatted;
                    chatBox.appendChild(aiBubble);
                    Prism.highlightAllUnder(aiBubble);
                } else {
                    aiBubble.innerHTML = `<b>AI:</b> ${reply}`;
                    chatBox.appendChild(aiBubble);
                }

                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (err) {
                chatBox.removeChild(typingIndicator);
                chatBox.innerHTML += `<p class="error"><b>Error:</b> ${err.message}</p>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        document.getElementById("message").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>

    <!-- Prism.js JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js
            <!-- Prism.js JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
</body>
</html>
