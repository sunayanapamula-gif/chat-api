<!DOCTYPE html>
<html>
<head>
    <title>🍊 Orange Chat Board</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Prism.js CSS for syntax highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(to bottom, #e0f7fa, #ffffff);
            color: #333;
            transition: background 0.5s ease;
        }

        h1 {
            text-align: center;
            padding: 20px;
            margin: 0;
            background: #ff8c00; /* orange rind */
            color: white;
            font-weight: 600;
            letter-spacing: 1px;
        }

        #chat-box {
            border: 8px solid #ff8c00;
            border-radius: 50%;
            background: radial-gradient(circle at center, #ffa500 70%, #ffcc80 100%);
            width: 420px;
            height: 420px;
            margin: 20px auto;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Glossy highlight */
        .glossy {
            position: absolute;
            top: 10%; left: 15%;
            width: 60%; height: 30%;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 70%);
            border-radius: 50%;
            opacity: 0.7;
            pointer-events: none;
        }

        /* Ripple animation */
        #chat-box::before {
            content: "";
            position: absolute;
            top: -20px; left: -20px;
            width: 460px; height: 460px;
            border-radius: 50%;
            border: 4px solid rgba(0, 188, 212, 0.4);
            animation: ripple 4s infinite ease-in-out;
        }
        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.3; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        /* Fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user, .ai {
            padding: 10px 14px;
            margin: 8px 0;
            display: inline-block;
            max-width: 70%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            animation: fadeIn 0.4s ease forwards;
        }
        .user {
            background: #ff7043;
            color: #fff;
            border-radius: 20px 20px 5px 20px;
            align-self: flex-end;
        }
        .ai {
            background: #fff3e0;
            color: #333;
            border-radius: 20px 20px 20px 5px;
            align-self: flex-start;
            word-wrap: break-word;
        }

        .error { color: red; margin: 4px 0; }

        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.9em;
        }
        code { font-family: Consolas, monospace; }

        /* Typing animation */
        .typing {
            font-style: italic;
            color: gray;
            margin: 6px 0;
            display: flex;
            align-items: center;
        }
        .typing span {
            display: inline-block;
            width: 6px; height: 6px;
            margin-left: 4px;
            background: gray;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); } 40% { transform: scale(1); } }

        /* Dark theme */
        body.dark { background: #121212; color: #eee; }
        body.dark #chat-box { background: radial-gradient(circle at center, #222 55%, #444 100%); box-shadow: 0 0 40px rgba(255,215,0,0.4), inset 0 0 20px rgba(255,215,0,0.2); }
        body.dark .ai { background: #333; color: #ffd700; }
        body.dark .user { background: #ff5722; }

        /* Golden star sparkles */
        .sparkle {
            position: absolute;
            width: 8px; height: 8px;
            background: radial-gradient(circle, #ffd700 40%, transparent 70%);
            border-radius: 50%;
            animation: sparkle 2s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes sparkle {
            0% { transform: scale(0.5); opacity: 0.6; }
            50% { transform: scale(1.4); opacity: 1; }
            100% { transform: scale(0.5); opacity: 0.6; }
        }
    </style>
</head>
<body>
    <h1>🍊 Orange Chat Board</h1>
    <button id="theme-btn" onclick="toggleTheme()">Toggle Dark Theme</button>
    <div id="chat-box"><div class="glossy"></div></div>
    <div id="input-box">
        <input type="text" id="message" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const msgInput = document.getElementById("message");
            const msg = msgInput.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById("chat-box");

            const userBubble = document.createElement("div");
            userBubble.className = "user";
            userBubble.innerHTML = `<b>You:</b> ${msg}`;
            chatBox.appendChild(userBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            msgInput.value = "";

            // Typing indicator
            const typingIndicator = document.createElement("p");
            typingIndicator.className = "typing";
            typingIndicator.innerHTML = "AI is typing <span></span><span></span><span></span>";
            chatBox.appendChild(typingIndicator);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();

                chatBox.removeChild(typingIndicator);

                let reply = data.response || "";
                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";

                // Handle code blocks with Prism.js
                if (reply.includes("```")) {
                    const parts = reply.split("```");
                    let formatted = "<b>AI:</b> ";
                    for (let i = 0; i < parts.length; i++) {
                        if (i % 2 === 0) {
                            formatted += parts[i];
                        } else {
                            const langParts = parts[i].trim().split("\n");
                            let lang = "language-python";
                            if (langParts[0].match(/^[a-zA-Z]+$/)) {
                                lang = "language-" + langParts[0].toLowerCase();
                                langParts.shift();
                            }
                            const codeContent = langParts.join("\n");
                            formatted += `<pre><code class="${lang}">${codeContent.replace(/</g,"&lt;")}</code></pre>`;
                        }
                    }
                    aiBubble.innerHTML = formatted;
                    chatBox.appendChild(aiBubble);
                    Prism.highlightAllUnder(aiBubble);
                } else {
                    aiBubble.innerHTML = `<b>AI:</b> ${reply}`;
                    chatBox.appendChild(aiBubble);
                }

                chatBox.scrollTop = chatBox.scrollHeight;

                        } catch (err) {
                chatBox.removeChild(typingIndicator);
                const aiBubble = document.createElement("div");
                aiBubble.className = "ai";
                aiBubble.innerHTML = `<b>Error:</b> ${err.message}`;
                chatBox.appendChild(aiBubble);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Dark theme toggle with sparkles
        function toggleTheme() {
            document.body.classList.toggle("dark");

            // Remove old sparkles
            document.querySelectorAll(".sparkle").forEach(s => s.remove());

            if (document.body.classList.contains("dark")) {
                const chatBox = document.getElementById("chat-box");
                for (let i = 0; i < 12; i++) {
                    const sparkle = document.createElement("div");
                    sparkle.className = "sparkle";
                    sparkle.style.top = Math.random() * (chatBox.offsetHeight - 20) + "px";
                    sparkle.style.left = Math.random() * (chatBox.offsetWidth - 20) + "px";
                    sparkle.style.animationDelay = (Math.random() * 2) + "s";
                    chatBox.appendChild(sparkle);
                }
            }
        }
    </script>

    <!-- Prism.js JS for syntax highlighting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
</body>
</html>
